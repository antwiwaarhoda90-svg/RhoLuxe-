<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RhoLuxe Chat" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#4F46E5" />
  <title>RhoLuxe Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo: #4F46E5;
      --indigo-dark: #3730A3;
      --indigo-light: #EEF2FF;
      --purple: #7C3AED;
      --green: #4ADE80;
      --bg: #F8F7FF;
      --card: #FFFFFF;
      --text: #1E1B4B;
      --muted: #6B7280;
      --border: rgba(79,70,229,0.15);
      --radius: 20px;
      --header-h: 80px;
      --subjects-h: 54px;
      --input-h: 72px;
      --quick-h: 48px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }

    /* ── HEADER ── */
    #header {
      background: linear-gradient(135deg, var(--indigo) 0%, var(--purple) 100%);
      padding: env(safe-area-inset-top, 12px) 20px 14px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    #header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    #header::after {
      content: '';
      position: absolute;
      bottom: -40px; right: 40px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    #header-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.3);
    }

    #header-info h1 {
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    #header-info p {
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      font-weight: 500;
    }

    #online-pill {
      margin-left: auto;
      background: rgba(74,222,128,0.2);
      border: 1px solid rgba(74,222,128,0.5);
      border-radius: 20px;
      padding: 4px 10px;
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700;
      color: #4ADE80;
      flex-shrink: 0;
    }
    #online-pill span { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; }

    /* ── SUBJECTS ── */
    #subjects {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    #subjects::-webkit-scrollbar { display: none; }

    .chip {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      white-space: nowrap;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.18s;
      background: #F3F4F6;
      color: #6B7280;
    }
    .chip.active {
      background: var(--indigo-light);
      color: var(--indigo);
      border-color: var(--indigo);
    }
    .chip:active { transform: scale(0.94); }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(79,70,229,0.2); border-radius: 3px; }

    .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 88%; animation: popIn 0.2s ease; }
    @keyframes popIn { from { opacity:0; transform: translateY(8px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .av {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .bot  .av { background: var(--indigo-light); }
    .user .av { background: var(--indigo); }

    .bubble {
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 500;
    }
    .bot .bubble {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 8px rgba(79,70,229,0.06);
    }
    .user .bubble {
      background: var(--indigo);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .ts { font-size: 10px; color: var(--muted); padding: 2px 4px; }

    /* ── TYPING ── */
    #typing { display: none; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--indigo); display: inline-block; margin: 0 2px; animation: bounce 1.1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

    /* ── QUICK PROMPTS ── */
    #quick {
      padding: 8px 14px;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      flex-shrink: 0;
      background: var(--bg);
    }
    #quick::-webkit-scrollbar { display: none; }

    .qbtn {
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 11px; font-weight: 800;
      font-family: 'Nunito', sans-serif;
      border: 2px solid var(--indigo);
      background: transparent;
      color: var(--indigo);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .qbtn:active { background: var(--indigo); color: #fff; transform: scale(0.94); }

    /* ── INPUT AREA ── */
    #input-area {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #txt {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      resize: none;
      outline: none;
      background: var(--bg);
      color: var(--text);
      max-height: 110px;
      min-height: 44px;
      line-height: 1.4;
      -webkit-appearance: none;
    }
    #txt:focus { border-color: var(--indigo); }
    #txt::placeholder { color: #9CA3AF; font-weight: 500; }

    #send {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--indigo);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #send:active { transform: scale(0.92); background: var(--indigo-dark); }
    #send svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      background: linear-gradient(135deg, #FEF3C7, #FDE68A);
      border-top: 1px solid #FCD34D;
      padding: 10px 16px;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #install-banner p { font-size: 12px; font-weight: 700; color: #92400E; flex: 1; }
    #install-btn {
      padding: 6px 14px;
      background: #D97706;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 12px; font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
    }
    #dismiss-btn {
      background: none; border: none;
      font-size: 18px; cursor: pointer; color: #92400E;
    }

    /* ── EMPTY STATE ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 30px 20px;
      text-align: center;
      opacity: 0.55;
    }
    #empty .big { font-size: 48px; }
    #empty p { font-size: 13px; font-weight: 600; color: var(--muted); }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-avatar">🎓</div>
    <div id="header-info">
      <h1>RhoLuxe Chat</h1>
      <p>Your smart study companion ✨</p>
    </div>
    <div id="online-pill"><span></span>Online</div>
  </div>

  <div id="subjects">
    <button class="chip active" onclick="setSubject(this,'General')">✨ All</button>
    <button class="chip" onclick="setSubject(this,'Mathematics')">🧮 Math</button>
    <button class="chip" onclick="setSubject(this,'Science')">🔬 Science</button>
    <button class="chip" onclick="setSubject(this,'English')">📖 English</button>
    <button class="chip" onclick="setSubject(this,'History')">🏛️ History</button>
    <button class="chip" onclick="setSubject(this,'Geography')">🌍 Geography</button>
    <button class="chip" onclick="setSubject(this,'Computer Science')">💻 Coding</button>
  </div>

  <div id="messages">
    <div class="msg bot" id="welcome">
      <div class="av">🎓</div>
      <div>
        <div class="bubble">Hey there, superstar! 👋🌟<br><br>I'm <strong>RhoLuxe Chat</strong> — your secret homework helper. Pick a subject above, then ask me anything! I'll explain it step by step so you truly understand. Let's ace this! 💪📚</div>
        <div class="ts">Just now</div>
      </div>
    </div>
    <div class="msg bot" id="typing" style="display:none">
      <div class="av">🎓</div>
      <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
  </div>

  <div id="quick">
    <button class="qbtn" onclick="quickSend('Explain this step by step 📝')">📝 Step by step</button>
    <button class="qbtn" onclick="quickSend('Give me a simple example 💡')">💡 Give example</button>
    <button class="qbtn" onclick="quickSend('I still don\'t get it, explain differently 🤔')">🤔 Explain again</button>
    <button class="qbtn" onclick="quickSendFocus('Check my answer: ')">✅ Check answer</button>
    <button class="qbtn" onclick="quickSend('Quiz me on this! 🎯')">🎯 Quiz me</button>
    <button class="qbtn" onclick="quickSend('Give me a summary of the key points 📋')">📋 Summarise</button>
  </div>

  <div id="install-banner">
    <p>📲 Add RhoLuxe Chat to your home screen!</p>
    <button id="install-btn" onclick="installApp()">Install</button>
    <button id="dismiss-btn" onclick="dismissInstall()">✕</button>
  </div>

  <div id="input-area">
    <textarea id="txt" placeholder="Ask your homework question..." rows="1"></textarea>
    <button id="send" onclick="send()" aria-label="Send">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<script>
  let subject = 'General';
  let history = [];
  let deferredPrompt = null;

  // PWA install prompt
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'flex';
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        dismissInstall();
      });
    }
  }

  function dismissInstall() {
    document.getElementById('install-banner').style.display = 'none';
  }

  function setSubject(el, s) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    subject = s;
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMsg(text, role) {
    const msgs = document.getElementById('messages');
    const typing = document.getElementById('typing');
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    const av = document.createElement('div');
    av.className = 'av';
    av.textContent = role === 'bot' ? '🎓' : '🧑‍🎓';

    const wrap = document.createElement('div');
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;
    const ts = document.createElement('div');
    ts.className = 'ts';
    ts.textContent = now();

    wrap.appendChild(bub);
    wrap.appendChild(ts);
    div.appendChild(av);
    div.appendChild(wrap);
    msgs.insertBefore(div, typing);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping(v) {
    document.getElementById('typing').style.display = v ? 'flex' : 'none';
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function send() {
    const txt = document.getElementById('txt');
    const q = txt.value.trim();
    if (!q) return;
    txt.value = '';
    txt.style.height = 'auto';

    addMsg(q, 'user');
    history.push({ role: 'user', content: q });
    showTyping(true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `You are RhoLuxe Chat, a warm, encouraging AI homework helper for school students. Be friendly, patient, and motivating — like a cool tutor. Always explain step by step in simple language. Use emojis naturally. Never make students feel bad. Keep answers clear and not too long. Current subject focus: ${subject}.`,
          messages: history
        })
      });
      const data = await res.json();
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      showTyping(false);
      addMsg(reply, 'bot');
    } catch (e) {
      showTyping(false);
      addMsg("Oops! Check your internet and try again 😅", 'bot');
    }
  }

  function quickSend(text) {
    document.getElementById('txt').value = text;
    send();
  }

  function quickSendFocus(text) {
    const t = document.getElementById('txt');
    t.value = text;
    t.focus();
    t.setSelectionRange(t.value.length, t.value.length);
  }

  const txt = document.getElementById('txt');
  txt.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  txt.addEventListener('input', () => {
    txt.style.height = 'auto';
    txt.style.height = Math.min(txt.scrollHeight, 110) + 'px';
  });
</script>
</body>
</html>
